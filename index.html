<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bibliothèque de Tsuyu</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h1 {
      text-align: center;
    }

    #searchBar {
      text-align: center;
      margin-bottom: 20px;
    }

    #results, #library {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 15px;
    }

    .book {
      border: 1px solid #ccc;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      background: #f9f9f9;
    }

    .book img {
      max-width: 100px;
      margin-bottom: 10px;
    }

    button {
      margin-top: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>📚 Bibliothèque de la Sorcière Tsuyu</h1>

  <div id="searchBar">
    <input type="text" id="search" placeholder="Rechercher un livre..." />
    <button id="searchBtn">🔍 Chercher</button>
  </div>

  <h2>🔎 Résultats</h2>
  <div id="results"></div>

  <h2>📚 Ma bibliothèque</h2>
  <div id="library"></div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://kmdkhpaxqnmyuapicycq.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImttZGtocGF4cW5teXVhcGljeWNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTQxODAsImV4cCI6MjA5MzEzMDE4MH0.GmWZFV7mqBAteOsxSNLQ8I6YTIG_uvg7lOkq7Ws_fLg"
    );

    // 🔍 Recherche améliorée
    async function searchBooks() {
      const query = document.getElementById("search").value;
      if (!query) return;

      const res = await fetch(
        `https://openlibrary.org/search.json?q=${encodeURIComponent(query)}`
      );

      const data = await res.json();

      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "";

      if (!data.docs || data.docs.length === 0) {
        resultsDiv.innerHTML = "<p>Aucun résultat 😢</p>";
        return;
      }

      data.docs
        .filter(book => 
          book.title &&
          book.author_name &&
          book.first_publish_year &&
          !book.title.toLowerCase().includes("disney") &&
          !book.title.toLowerCase().includes("carrousel")
        )
        .slice(0, 12)
        .forEach(book => {

          const info = {
            title: book.title,
            author: book.author_name[0],
            cover: book.cover_i
              ? `https://covers.openlibrary.org/b/id/${book.cover_i}-M.jpg`
              : ""
          };

          const div = document.createElement("div");
          div.className = "book";

          div.innerHTML = `
            ${info.cover ? `<img src="${info.cover}">` : ""}
            <div><strong>${info.title}</strong></div>
            <div>${info.author}</div>
          `;

          const button = document.createElement("button");
          button.textContent = "➕ Ajouter";
          button.onclick = () => addBook(info);

          div.appendChild(button);
          resultsDiv.appendChild(div);
        });
    }

    // ➕ Ajouter livre
    async function addBook(info) {
      const { error } = await supabaseClient.from("books").insert([
        {
          title: info.title,
          author: info.author,
          cover_url: info.cover
        }
      ]);

      if (error) {
        console.error(error);
        alert("Erreur 😢");
      } else {
        loadLibrary();
      }
    }

    // 📚 Charger bibliothèque
    async function loadLibrary() {
      const { data } = await supabaseClient
        .from("books")
        .select("*");

      const libraryDiv = document.getElementById("library");
      libraryDiv.innerHTML = "";

      if (!data || data.length === 0) {
        libraryDiv.innerHTML = "<p>Aucun livre pour l'instant</p>";
        return;
      }

      data.forEach(book => {
        const div = document.createElement("div");
        div.className = "book";

        div.innerHTML = `
          ${book.cover_url ? `<img src="${book.cover_url}">` : ""}
          <div><strong>${book.title}</strong></div>
          <div>${book.author}</div>
        `;

        libraryDiv.appendChild(div);
      });
    }

    document.getElementById("searchBtn").addEventListener("click", searchBooks);

    loadLibrary();
  </script>
</body>
</html>
